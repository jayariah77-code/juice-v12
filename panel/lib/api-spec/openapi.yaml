openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Juice v12 Bot Control Panel API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bot
    description: Bot control and settings
  - name: stats
    description: Bot statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /bot/settings:
    get:
      operationId: getBotSettings
      tags: [bot]
      summary: Get current bot settings
      responses:
        "200":
          description: Bot settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotSettings"
    put:
      operationId: updateBotSettings
      tags: [bot]
      summary: Update bot settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotSettings"
  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get bot connection status
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"
  /bot/commands:
    get:
      operationId: getBotCommands
      tags: [bot]
      summary: Get list of all bot commands
      responses:
        "200":
          description: Commands list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandsResponse"
  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get bot statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    BotSettings:
      type: object
      properties:
        botName:
          type: string
        ownerNumber:
          type: string
        botPrefix:
          type: string
        welcome:
          type: boolean
        antiLink:
          type: boolean
        antiCall:
          type: boolean
        autoRead:
          type: boolean
        chatBot:
          type: boolean
        autoViewStatus:
          type: boolean
        autoLikeStatus:
          type: boolean
        autoReact:
          type: boolean
        autoReactEmoji:
          type: string
        pmBlocker:
          type: boolean
        antiBadword:
          type: boolean
        antiTag:
          type: boolean
        antiDelete:
          type: boolean
        timezone:
          type: string
        repoUrl:
          type: string
      required:
        - botName
        - ownerNumber
        - botPrefix

    BotStatus:
      type: object
      properties:
        connected:
          type: boolean
        phone:
          type: string
        uptime:
          type: number
        version:
          type: string
        platform:
          type: string
      required: [connected]

    CommandsResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/CommandCategory"
      required: [categories]

    CommandCategory:
      type: object
      properties:
        name:
          type: string
        icon:
          type: string
        commands:
          type: array
          items:
            $ref: "#/components/schemas/Command"
      required: [name, commands]

    Command:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required: [name, description]

    BotStats:
      type: object
      properties:
        totalMessages:
          type: number
        totalUsers:
          type: number
        totalGroups:
          type: number
        commandsUsed:
          type: number
        uptime:
          type: number
        memoryUsage:
          type: number
      required: [totalMessages, totalUsers, totalGroups, commandsUsed, uptime, memoryUsage]
